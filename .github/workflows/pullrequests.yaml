name: CI Pipeline

on:
  pull_request:
    branches: ["**"]

jobs:
  run_linter:
    name: Lint Code
    runs-on: ubuntu-latest
    container: ${{ vars.UV_CONTAINER_IMAGE }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Ruff
        run: uv run ruff check .

  run_coverage:
    name: Run tests and check coverage
    runs-on: ubuntu-latest
    container: ${{ vars.UV_CONTAINER_IMAGE }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run Pytest with Coverage
        run: uv run pytest --cov=src/ --cov-fail-under=${{ vars.MINIMAL_TEST_COVERAGE }}

  check_types:
    name: Check typing
    runs-on: ubuntu-latest
    container: ${{ vars.UV_CONTAINER_IMAGE }}
    steps:
      - uses: actions/checkout@v4
      - name: Run basedpyright
        run: uv run basedpyright src/

  check_pdes_is_build:
    name: Ensure pde.py were not manually altered
    runs-on: ubuntu-latest
    container: ${{ vars.UV_CONTAINER_IMAGE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Run just
        run: just generate-pdes

      - name: Check difference
        run: git diff --exit-code
