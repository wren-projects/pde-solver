[project]
name = "wren-ttd"
description = "Library for working with Tensor Train Decompositions"
dependencies = ["numpy~=2.3", "wren-common"]
dynamic = ["version"]

[build-system]
requires = ["hatchling", "hatch-vcs"] 
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.0-dev"

[tool.hatch.version.raw-options]
search_parent_directories = true

[tool.pytest.ini_options]
pythonpath = ["src"]
