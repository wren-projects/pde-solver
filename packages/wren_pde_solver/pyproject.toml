[project]
name = "wren-pde-solver"
description = "Library providing solvers for PDEs"
dependencies = ["numpy~=2.3", "sympy~=1.14", "wren_common"]
dynamic = ["version"]

[build-system]
requires = ["hatchling", "hatch-vcs"] 
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.0-dev"

[tool.hatch.version.raw-options]
search_parent_directories = true

[tool.pytest.ini_options]
pythonpath = ["src"]
